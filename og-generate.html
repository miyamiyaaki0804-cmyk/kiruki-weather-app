<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      background: linear-gradient(135deg, #050E1F 0%, #0F2456 35%, #1A3880 65%, #1D4ED8 100%);
      font-family: 'Hiragino Sans', 'Yu Gothic UI', 'Meiryo', 'Helvetica Neue', Arial, sans-serif;
      color: white;
      position: relative;
    }
    .orb1 {
      position: absolute;
      width: 560px; height: 560px;
      background: radial-gradient(circle, rgba(99,102,241,0.38) 0%, transparent 70%);
      top: -160px; right: -80px;
      pointer-events: none;
    }
    .orb2 {
      position: absolute;
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(59,130,246,0.28) 0%, transparent 70%);
      bottom: -120px; left: 60px;
      pointer-events: none;
    }
    .rings {
      position: absolute;
      top: -60px; right: -60px;
      pointer-events: none;
    }
    .layout {
      position: relative;
      z-index: 1;
      display: flex;
      height: 100%;
      align-items: center;
      padding: 0 68px;
      gap: 56px;
    }

    /* Icon circle */
    .icon-wrap {
      flex-shrink: 0;
      position: relative;
    }
    .icon-glow {
      position: absolute;
      inset: -40px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.30) 0%, transparent 70%);
    }
    .icon-circle {
      width: 268px;
      height: 268px;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.20);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 132px;
      line-height: 1;
      box-shadow: 0 0 60px rgba(99,102,241,0.35), 0 0 120px rgba(99,102,241,0.15);
      position: relative;
      z-index: 1;
    }
    /* Weather mini icons */
    .weather-sun {
      position: absolute;
      top: 8px; right: -8px;
      font-size: 38px;
      filter: drop-shadow(0 0 8px rgba(251,191,36,0.6));
    }
    .weather-cloud {
      position: absolute;
      bottom: 16px; left: -16px;
      font-size: 30px;
      opacity: 0.85;
    }
    .weather-therm {
      position: absolute;
      top: 48px; left: -20px;
      font-size: 28px;
      opacity: 0.9;
    }

    /* Content */
    .content { flex: 1; }
    .label {
      font-size: 13px;
      letter-spacing: 5px;
      color: #93C5FD;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .title {
      font-size: 104px;
      font-weight: 900;
      letter-spacing: -5px;
      line-height: 0.92;
      margin-bottom: 14px;
      background: linear-gradient(135deg, #ffffff 0%, #C7D2FE 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
    }
    .tagline-jp {
      font-size: 20px;
      color: rgba(255,255,255,0.80);
      margin-bottom: 22px;
      line-height: 1.65;
      letter-spacing: 0.5px;
    }
    .tagline-jp strong {
      color: #BAE6FD;
      font-weight: 700;
    }
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0.20), transparent);
      margin-bottom: 20px;
    }
    .badges {
      display: flex;
      gap: 10px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }
    .badge {
      background: rgba(255,255,255,0.11);
      border: 1.5px solid rgba(255,255,255,0.22);
      border-radius: 50px;
      padding: 7px 16px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .badge.accent {
      background: rgba(99,102,241,0.30);
      border-color: rgba(165,180,252,0.50);
    }
    .url {
      font-size: 13px;
      color: rgba(255,255,255,0.32);
      letter-spacing: 0.8px;
    }
  </style>
</head>
<body>
  <div class="orb1"></div>
  <div class="orb2"></div>
  <!-- Decorative rings (SVG) -->
  <svg class="rings" width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="200" cy="200" r="190" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <circle cx="200" cy="200" r="140" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <circle cx="200" cy="200" r="90"  stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  </svg>

  <div class="layout">
    <!-- Icon -->
    <div class="icon-wrap">
      <div class="icon-glow"></div>
      <div class="icon-circle">👕</div>
      <div class="weather-sun">☀️</div>
      <div class="weather-cloud">🌤️</div>
      <div class="weather-therm">🌡️</div>
    </div>

    <!-- Content -->
    <div class="content">
      <div class="label">着る気象アプリ</div>
      <div class="title">KiruKi</div>
      <div class="tagline-jp">
        今日の天気に合った服装を、<strong>AIが毎朝提案</strong>します。<br>
        使うほどあなた専用になる服装パートナー。
      </div>
      <div class="divider"></div>
      <div class="badges">
        <div class="badge">🌡️ AI服装提案</div>
        <div class="badge">📸 コーデ記録</div>
        <div class="badge accent">🧠 使うほど精度UP</div>
        <div class="badge">🗾 全国気温マップ</div>
      </div>
      <div class="url">kiruki-weather-app-dyou.vercel.app</div>
    </div>
  </div>
</body>
</html>
