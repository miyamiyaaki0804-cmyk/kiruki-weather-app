<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; overflow: hidden; background: #050E1F; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c" width="1200" height="630"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1200, H = 630;
const cx = W / 2, cy = H / 2 - 36;

// ── Background ──────────────────────────────────────────────────
const bg = ctx.createRadialGradient(cx, cy - 60, 0, cx, cy, 520);
bg.addColorStop(0,   '#0F2456');
bg.addColorStop(0.5, '#081A40');
bg.addColorStop(1,   '#020B1E');
ctx.fillStyle = bg;
ctx.fillRect(0, 0, W, H);

// subtle corner orbs
const orbL = ctx.createRadialGradient(0, H, 0, 0, H, 320);
orbL.addColorStop(0, 'rgba(59,130,246,0.18)');
orbL.addColorStop(1, 'transparent');
ctx.fillStyle = orbL;
ctx.fillRect(0, 0, W, H);

const orbR = ctx.createRadialGradient(W, 0, 0, W, 0, 380);
orbR.addColorStop(0, 'rgba(99,102,241,0.20)');
orbR.addColorStop(1, 'transparent');
ctx.fillStyle = orbR;
ctx.fillRect(0, 0, W, H);

// ── Aperture segments ────────────────────────────────────────────
const R_OUT = 206;   // outer radius
const R_IN  = 90;    // inner radius (central circle)
const N     = 6;     // blade count
const GAP   = 7;     // gap in degrees

// Color palette: alternating blue/indigo shades
const COLORS = [
  ['#1D4ED8', '#4338CA'],
  ['#2563EB', '#6366F1'],
  ['#1E40AF', '#3730A3'],
  ['#2563EB', '#4F46E5'],
  ['#1D4ED8', '#4338CA'],
  ['#2563EB', '#6366F1'],
];

// outer decorative ring
ctx.beginPath();
ctx.arc(cx, cy, R_OUT + 14, 0, Math.PI * 2);
ctx.strokeStyle = 'rgba(255,255,255,0.07)';
ctx.lineWidth = 1.5;
ctx.stroke();

ctx.beginPath();
ctx.arc(cx, cy, R_OUT + 28, 0, Math.PI * 2);
ctx.strokeStyle = 'rgba(255,255,255,0.04)';
ctx.lineWidth = 1;
ctx.stroke();

// draw each blade/segment
for (let i = 0; i < N; i++) {
  const degStart = i * (360 / N) + GAP / 2;
  const degEnd   = (i + 1) * (360 / N) - GAP / 2;
  const aStart = degStart * Math.PI / 180;
  const aEnd   = degEnd   * Math.PI / 180;

  // gradient from inner-arc-midpoint to outer-arc-midpoint
  const aMid = (aStart + aEnd) / 2;
  const gx1 = cx + R_IN  * Math.cos(aMid);
  const gy1 = cy + R_IN  * Math.sin(aMid);
  const gx2 = cx + R_OUT * Math.cos(aMid);
  const gy2 = cy + R_OUT * Math.sin(aMid);

  const grad = ctx.createLinearGradient(gx1, gy1, gx2, gy2);
  grad.addColorStop(0, COLORS[i][0]);
  grad.addColorStop(1, COLORS[i][1]);

  ctx.beginPath();
  ctx.moveTo(cx + R_IN * Math.cos(aStart), cy + R_IN * Math.sin(aStart));
  ctx.lineTo(cx + R_OUT * Math.cos(aStart), cy + R_OUT * Math.sin(aStart));
  ctx.arc(cx, cy, R_OUT, aStart, aEnd);
  ctx.lineTo(cx + R_IN * Math.cos(aEnd), cy + R_IN * Math.sin(aEnd));
  ctx.arc(cx, cy, R_IN, aEnd, aStart, true);
  ctx.closePath();

  ctx.fillStyle = grad;
  ctx.fill();

  // subtle highlight on outer edge
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(cx, cy, R_OUT, aStart, aEnd);
  ctx.stroke();
}

// ── Central circle ───────────────────────────────────────────────
const innerGrad = ctx.createRadialGradient(cx, cy - 20, 0, cx, cy, R_IN);
innerGrad.addColorStop(0, '#0C1A3D');
innerGrad.addColorStop(1, '#060F27');
ctx.beginPath();
ctx.arc(cx, cy, R_IN - 1, 0, Math.PI * 2);
ctx.fillStyle = innerGrad;
ctx.fill();
ctx.strokeStyle = 'rgba(255,255,255,0.12)';
ctx.lineWidth = 1.5;
ctx.stroke();

// ── "K" letter ───────────────────────────────────────────────────
const kGrad = ctx.createLinearGradient(cx - 40, cy - 50, cx + 40, cy + 50);
kGrad.addColorStop(0, '#FFFFFF');
kGrad.addColorStop(0.5, '#C7D2FE');
kGrad.addColorStop(1, '#93C5FD');

ctx.fillStyle = kGrad;
ctx.font = '900 86px "Helvetica Neue", "Arial Black", Arial, sans-serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('K', cx, cy + 3);

// ── Text below logo ──────────────────────────────────────────────
const textY = cy + R_OUT + 28;

// "KiruKi" title
const titleGrad = ctx.createLinearGradient(cx - 120, 0, cx + 120, 0);
titleGrad.addColorStop(0, '#FFFFFF');
titleGrad.addColorStop(1, '#C7D2FE');
ctx.fillStyle = titleGrad;
ctx.font = '900 58px "Helvetica Neue", "Arial Black", Arial, sans-serif';
ctx.letterSpacing = '-2px';
ctx.textAlign = 'center';
ctx.textBaseline = 'top';
ctx.fillText('KiruKi', cx, textY);

// subtitle
ctx.fillStyle = 'rgba(147,197,253,0.85)';
ctx.font = '600 20px "Hiragino Sans", "Yu Gothic", "Meiryo", "Helvetica Neue", Arial, sans-serif';
ctx.letterSpacing = '4px';
ctx.fillText('着る気象アプリ', cx, textY + 68);
</script>
</body>
</html>
